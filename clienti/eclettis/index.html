<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ECLETTIS | Private Digital Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #000000;
            --accent: #52525b;
            --border: rgba(0, 0, 0, 0.1);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            overflow-x: hidden;
        }

        /* SOLUZIONE DEFINITIVA PER IL BLOCCO: pointer-events: none */
        #vanta-background {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none; /* Il tocco non viene sentito dallo sfondo */
        }

        .main-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            width: 90%;
            max-width: 450px;
            /* TOTALMENTE TRASPARENTE */
            background: transparent; 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 50px 30px;
            border: 1px solid var(--border);
            border-radius: 2px;
            color: var(--primary);
            text-align: center;
        }

        .brand-name {
            font-weight: 800;
            letter-spacing: 12px;
            font-size: 1.8rem;
            margin-bottom: 45px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        .direct-contacts {
            text-align: left;
            margin-bottom: 45px;
            background: rgba(0, 0, 0, 0.02);
            padding: 25px;
            border-left: 3px solid var(--primary);
        }

        .contact-label {
            font-size: 0.65rem;
            letter-spacing: 3px;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
        }

        .contact-value {
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 20px;
            display: block;
            text-decoration: none;
            color: var(--primary);
        }

        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            text-decoration: none;
            color: var(--primary);
            border: 1px solid var(--border);
            padding: 18px;
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn:hover {
            background: var(--primary);
            color: #fff;
        }

        .powered {
            margin-top: 50px;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 6px;
            color: var(--primary);
            text-transform: uppercase;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div id="vanta-background"></div>

    <div class="main-wrapper">
        <div class="card">
            <div class="brand-name">ECLETTIS</div>
            
            <div class="direct-contacts">
                <span class="contact-label">Sede Centrale</span>
                <a href="https://www.google.com/maps/dir/?api=1&destination=Eclettis+Belvedere+Ostrense" class="contact-value" target="_blank">
                    Via Rosciano 1/A<br>Belvedere Ostrense (AN)
                </a>
                <span class="contact-label">Linea Diretta</span>
                <a href="tel:00390731217038" class="contact-value">T. 0731 217038</a>
                <span class="contact-label">Privileged Email</span>
                <a href="mailto:info@eclettis.com" class="contact-value">info@eclettis.com</a>
            </div>

            <div class="btn-stack">
                <a href="https://www.linkedin.com/company/fin-owner-srl-eclettis/" class="btn">LinkedIn</a>
                <a href="https://www.facebook.com/eclettis/" class="btn">Facebook</a>
                <a href="https://www.instagram.com/eclettis.official/" class="btn">Instagram</a>
            </div>

            <a href="https://sabrtech.it" style="text-decoration:none">
                <p class="powered">Powered by SABR</p>
            </a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.1/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.topology.min.js"></script>

    <script>
        // Inizializzazione con controlli totalmente disattivati
        VANTA.TOPOLOGY({
            el: "#vanta-background",
            mouseControls: false,
            touchControls: false,
            gyroControls: false,
            minHeight: 200.00,
            minWidth: 200.00,
            scale: 1.00,
            scaleMobile: 1.00,
            color: 0x1a1a1a,
            backgroundColor: 0xffffff
        });
    </script>
</body>
</html>
