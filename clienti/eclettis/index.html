<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <!-- Blocco totale dello zoom e del ridimensionamento a livello di sistema -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>ECLETTIS | Private Digital Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #000000;
            --accent: #52525b;
            --border: rgba(0, 0, 0, 0.1);
        }

        /* Impediamo ogni movimento alla radice */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Blocca su e giù */
            position: fixed; /* Evita il rimbalzo su iOS */
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            touch-action: none; /* Impedisce gesti del browser sullo sfondo */
        }

        #vanta-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .main-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
        }

        .card {
            width: 85%;
            max-width: 400px;
            /* TRASPARENZA TOTALE */
            background: transparent;
            /* Sfocatura per isolare il testo dai tratti neri dello sfondo */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px 25px;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--primary);
            text-align: center;
            /* Riabilita i click solo sui pulsanti e link dentro la card */
            pointer-events: auto; 
        }

        .brand-name {
            font-weight: 800;
            letter-spacing: 10px;
            font-size: 1.6rem;
            margin-bottom: 35px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }

        .direct-contacts {
            text-align: left;
            margin-bottom: 35px;
            background: rgba(0, 0, 0, 0.02);
            padding: 20px;
            border-left: 3px solid var(--primary);
        }

        .contact-label {
            font-size: 0.6rem;
            letter-spacing: 2px;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }

        .contact-value {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 15px;
            display: block;
            text-decoration: none;
            color: var(--primary);
        }

        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            text-decoration: none;
            color: var(--primary);
            border: 1px solid var(--border);
            padding: 15px;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: 0.3s;
            background: rgba(255, 255, 255, 0.1);
        }

        .btn:active {
            background: var(--primary);
            color: #fff;
        }

        .powered {
            margin-top: 40px;
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 5px;
            color: var(--primary);
            text-transform: uppercase;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div id="vanta-background"></div>

    <div class="main-wrapper">
        <div class="card">
            <div class="brand-name">ECLETTIS</div>
            
            <div class="direct-contacts">
                <span class="contact-label">Sede Centrale</span>
                <a href="https://www.google.com/maps/dir/?api=1&destination=Eclettis+Belvedere+Ostrense" class="contact-value" target="_blank">
                    Via Rosciano 1/A<br>Belvedere (AN)
                </a>
                <span class="contact-label">Linea Diretta</span>
                <a href="tel:00390731217038" class="contact-value">T. 0731 217038</a>
                <span class="contact-label">Privileged Email</span>
                <a href="mailto:info@eclettis.com" class="contact-value">info@eclettis.com</a>
            </div>

            <div class="btn-stack">
                <a href="https://www.linkedin.com/company/fin-owner-srl-eclettis/" class="btn">LinkedIn</a>
                <a href="https://www.facebook.com/eclettis/" class="btn">Facebook</a>
                <a href="https://www.instagram.com/eclettis.official/" class="btn">Instagram</a>
            </div>

            <a href="https://sabrtech.it" style="text-decoration:none">
                <p class="powered">Powered by SABR</p>
            </a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.1/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.topology.min.js"></script>

    <script>
        // Inizializzazione pulita
        VANTA.TOPOLOGY({
            el: "#vanta-background",
            mouseControls: false,
            touchControls: false,
            gyroControls: false,
            minHeight: 200.00,
            minWidth: 200.00,
            scale: 1.00,
            scaleMobile: 1.00,
            color: 0x1a1a1a,
            backgroundColor: 0xffffff
        });

        // Forza il blocco dello scroll via JS per sicurezza extra su alcuni browser
        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
