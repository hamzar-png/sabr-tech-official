<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Marmo Meccanica | World Leader | SABR</title>
    
    <link rel="icon" type="image/png" href="favicon_marmo.png">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            color: #1a1a1a; 
            height: 100vh; /* Forza l'altezza dello schermo */
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Centra tutto verticalmente */
            overflow: hidden; /* Impedisce lo scroll della pagina intera */
            padding: 10px;
            
            /* SFONDO BLOCCATO */
            background: url('https://plus.unsplash.com/premium_photo-1708069702342-1f6339a74751?q=80&w=1332&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
        }

        /* Overlay fisso per evitare movimenti dello sfondo */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.2); 
            z-index: -1;
        }

        .company-header {
            margin-bottom: 20px; /* Ridotto per mobile */
            text-align: center;
        }

        .company-logo {
            max-width: 200px; /* Più piccolo per stare nello schermo */
            height: auto;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
            margin-bottom: 5px;
        }

        .leader-badge {
            font-family: 'Cinzel', serif;
            font-size: 8px; /* Ridotto */
            letter-spacing: 3px;
            color: #b8860b; 
            text-transform: uppercase;
            font-weight: 700;
        }

        .container { 
            width: 100%;
            max-width: 400px;
        }

        .marble-card {
            background: rgba(255, 255, 255, 0.7);
            padding: 20px 25px; /* Ridotto */
            border-radius: 2px;
            border: 1px solid rgba(184, 134, 11, 0.3); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px); /* Per iPhone */
            position: relative;
        }

        .marble-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, #b8860b, #ffd700, #b8860b);
        }

        .panel-title { 
            font-family: 'Cinzel', serif;
            font-size: 10px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 15px;
            text-align: center;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding-bottom: 10px;
        }

        .info-link { 
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #333;
            margin-bottom: 12px;
            transition: 0.3s;
        }

        .icon-box {
            width: 30px;
            height: 30px;
            background: #1a2a44; 
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            border-radius: 50%;
            font-size: 12px;
            flex-shrink: 0;
        }

        .label { font-size: 8px; text-transform: uppercase; color: #888; font-weight: 700; }
        .value { font-size: 13px; font-weight: 400; }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .dept-box {
            background: rgba(26, 42, 68, 0.05);
            padding: 12px;
            border-left: 3px solid #1a2a44;
            text-decoration: none;
            color: #1a2a44;
        }

        .final-actions { margin-top: 20px; text-align: center; }
        
        .btn-gold {
            display: inline-block;
            background: #1a2a44;
            color: white;
            padding: 15px 35px;
            border: 1px solid #b8860b;
            font-family: 'Cinzel', serif;
            font-size: 10px;
            font-weight: 700;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-sabr-brand { 
            display: inline-block;
            margin-top: 15px; 
            text-decoration: none; 
            font-size: 9px; 
            letter-spacing: 2px; 
            color: #666; 
            text-transform: uppercase;
        }

        .btn-sabr-brand span { font-weight: 800; color: #1a2a44; }

        /* AGGIUSTAMENTI PER SCHERMI MOLTO PICCOLI */
        @media (max-height: 700px) {
            .company-header { margin-top: 0; margin-bottom: 10px; }
            .marble-card { padding: 15px; }
            .info-link { margin-bottom: 8px; }
            .dept-box { padding: 8px; }
            .company-logo { max-width: 160px; }
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <header class="company-header">
        <img src="logo_marmo.png" alt="Marmo Meccanica Logo" class="company-logo">
        <p class="leader-badge">Precision Stone Technology</p>
    </header>

    <div class="container">
        <div class="marble-card">
            <p class="panel-title">Global Contact Hub</p>
            
            <a href="tel:+39073160999" class="info-link">
                <div class="icon-box">T</div>
                <div>
                    <p class="label">Switchboard</p>
                    <p class="value">+39 0731 60999</p>
                </div>
            </a>

            <a href="mailto:info@marmomeccanica.com" class="info-link">
                <div class="icon-box">E</div>
                <div>
                    <p class="label">General Inquiry</p>
                    <p class="value">info@marmomeccanica.com</p>
                </div>
            </a>

            <a href="https://www.google.com/maps/search/?api=1&query=Marmo+Meccanica+Monsano" target="_blank" class="info-link">
                <div class="icon-box">A</div>
                <div>
                    <p class="label">Headquarters</p>
                    <p class="value">Monsano (AN) - Italy</p>
                </div>
            </a>

            <div class="contact-grid">
                <a href="mailto:sales@marmomeccanica.com" class="dept-box">
                    <p class="label">International Sales</p>
                    <p class="value">sales@marmomeccanica.com</p>
                </a>
            </div>
            
            <div style="margin-top: 15px; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 10px; text-align: center;">
                 <p class="label">Fax: +39 0731 605244</p>
            </div>
        </div>
    </div>

    <footer class="final-actions">
        <a href="mailto:hamza@sabrtech.it?subject=MagTag Inquiry" class="btn-gold">
            Attiva Servizio MagTag
        </a>
        <br>
        <a href="https://sabrtech.it" class="btn-sabr-brand">
            Powered by <span>SABR</span>
        </a>
    </footer>

</body>
</html>
