<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joytek | Innovation & Automation | SABR</title>
    
    <link rel="icon" type="image/png" href="favicon_joytek.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Outfit', sans-serif; 
            color: #ffffff; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Contenitore per lo sfondo animato */
        #vanta-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Lo tiene dietro a tutto */
        }

        /* Contenitore principale per il contenuto */
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            width: 100%;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        .company-header {
            margin-top: 40px;
            margin-bottom: 30px;
            text-align: center;
        }

        .company-logo {
            max-width: 220px;
            height: auto;
        }

        .tagline {
            font-size: 11px;
            letter-spacing: 5px;
            color: #00f2ff;
            text-transform: uppercase;
            font-weight: 600;
            margin-top: 10px;
        }

        .container { 
            width: 100%;
            max-width: 400px;
        }

        /* CARD TECH */
        .tech-card {
            background: rgba(255, 255, 255, 0.05); /* Leggermente più visibile per staccare dal grigio */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            position: relative;
        }

        .tech-card::after {
            content: '';
            position: absolute;
            top: -1px; left: 50%; transform: translateX(-50%);
            width: 40%; height: 2px;
            background: linear-gradient(90deg, transparent, #00f2ff, transparent);
        }

        .info-link { 
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #fff;
            padding: 15px;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            transition: 0.3s ease;
        }

        .info-link:hover {
            background: rgba(0, 242, 255, 0.1);
            transform: translateY(-3px);
        }

        .icon {
            width: 40px;
            height: 40px;
            background: rgba(0, 242, 255, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 18px;
            color: #00f2ff;
        }

        .label { font-size: 10px; text-transform: uppercase; color: #a1a1a1; font-weight: 600; }
        .value { font-size: 15px; font-weight: 400; }

        .linkedin-box {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        .linkedin-btn {
            background: #0077b5;
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .linkedin-btn:hover { background: #00a0dc; }

        .final-actions { margin-top: 40px; text-align: center; }
        
        .btn-main {
            display: inline-block;
            background: linear-gradient(135deg, #00f2ff, #0066ff);
            color: white;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 10px 20px rgba(0, 242, 255, 0.2);
        }

        .btn-sabr-brand { 
            display: inline-block;
            margin-top: 30px; 
            text-decoration: none; 
            font-size: 10px; 
            letter-spacing: 3px; 
            color: #ccc; /* Schiarito per il nuovo sfondo */
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-sabr-brand span { font-weight: 800; color: #00f2ff; }
    </style>
</head>
<body>

    <!-- Div per lo sfondo Vanta -->
    <div id="vanta-bg"></div>

    <div class="main-content">
        <header class="company-header">
            <img src="logo_joytek.png" alt="Joytek Logo" class="company-logo">
            <p class="tagline">Smart Solutions</p>
        </header>

        <div class="container">
            <div class="tech-card">
                
                <a href="tel:+390731693222" class="info-link">
                    <div class="icon">📞</div>
                    <div>
                        <p class="label">Phone</p>
                        <p class="value">+39 0731 693222</p>
                    </div>
                </a>

                <a href="mailto:info@joytek.it" class="info-link">
                    <div class="icon">✉️</div>
                    <div>
                        <p class="label">Email</p>
                        <p class="value">info@joytek.it</p>
                    </div>
                </a>

                <a href="https://www.google.com/maps/search/?api=1&query=Joytek+San+Giuseppe+6+San+Paolo+di+Jesi" target="_blank" class="info-link">
                    <div class="icon">📍</div>
                    <div>
                        <p class="label">Address</p>
                        <p class="value">Via San Giuseppe, 6<br>60038 San Paolo di Jesi (AN)</p>
                    </div>
                </a>

                <div class="linkedin-box">
                    <a href="https://www.linkedin.com/company/joytek-srls/" target="_blank" class="linkedin-btn">
                        <span>in</span> 
                    </a>
                </div>
            </div>
        </div>

        <footer class="final-actions">
            <a href="mailto:hamza@sabrtech.it?subject=MagTag Inquiry - Joytek" class="btn-main">
               Attiva Servizio MagTag
            </a>
            <br>
            <a href="https://sabrtech.it" class="btn-sabr-brand">
                Powered by <span>SABR</span>
            </a>
        </footer>
    </div>

    <!-- Script Vanta.js e Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    
    <script>
    VANTA.NET({
      el: "#vanta-bg",
      mouseControls: true,
      touchControls: true,
      gyroControls: false,
      minHeight: 200.00,
      minWidth: 200.00,
      scale: 1.00,
      scaleMobile: 1.00,
      color: 0x1fff,
      backgroundColor: 0x262626,
      points: 11.00,
      maxDistance: 23.00,
      spacing: 17.00
    })
    </script>

</body>
</html>
