<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joytek | Innovation & Automation | SABR</title>
    
    <link rel="icon" type="image/png" href="favicon_joytek.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Outfit', sans-serif; 
            color: #ffffff; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* SFONDO: Tech scuro con griglia digitale */
            background: #050a14;
            background-image: 
                radial-gradient(circle at 80% 70%, rgba(0, 102, 255, 0.08) 0%, transparent 40%),
                linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)),
                url('https://images.unsplash.com/photo-1644088379091-d574269d422f?q=80&w=1393&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
            background-size: cover;
            padding: 20px;
        }

        .company-header {
            margin-top: 40px;
            margin-bottom: 30px;
            text-align: center;
        }

        .company-logo {
            max-width: 220px;
            height: auto;
            /* Filtro per far risaltare il logo su sfondo scuro se necessario */
        }

        .tagline {
            font-size: 11px;
            letter-spacing: 5px;
            color: #00f2ff;
            text-transform: uppercase;
            font-weight: 600;
            margin-top: 10px;
        }

        .container { 
            width: 100%;
            max-width: 400px;
        }

        /* CARD TECH */
        .tech-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        .tech-card::after {
            content: '';
            position: absolute;
            top: -1px; left: 50%; transform: translateX(-50%);
            width: 40%; height: 2px;
            background: linear-gradient(90deg, transparent, #00f2ff, transparent);
        }

        .info-link { 
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #fff;
            padding: 15px;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            transition: 0.3s ease;
        }

        .info-link:hover {
            background: rgba(0, 242, 255, 0.1);
            transform: translateY(-3px);
        }

        .icon {
            width: 40px;
            height: 40px;
            background: rgba(0, 242, 255, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 18px;
            color: #00f2ff;
        }

        .label { font-size: 10px; text-transform: uppercase; color: #667085; font-weight: 600; }
        .value { font-size: 15px; font-weight: 400; }

        .linkedin-box {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        .linkedin-btn {
            background: #0077b5;
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .linkedin-btn:hover { background: #00a0dc; }

        .final-actions { margin-top: 40px; text-align: center; }
        
        .btn-main {
            display: inline-block;
            background: linear-gradient(135deg, #00f2ff, #0066ff);
            color: white;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 10px 20px rgba(0, 242, 255, 0.2);
        }

        .btn-sabr-brand { 
            display: inline-block;
            margin-top: 30px; 
            text-decoration: none; 
            font-size: 10px; 
            letter-spacing: 3px; 
            color: #444; 
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-sabr-brand span { font-weight: 800; color: #00f2ff; }
    </style>
</head>
<body>

    <header class="company-header">
        <!-- Usa logo_joytek.png -->
        <img src="logo_joytek.png" alt="Joytek Logo" class="company-logo">
        <p class="tagline">Smart Solutions</p>
    </header>

    <div class="container">
        <div class="tech-card">
            
            <a href="tel:+390731693222" class="info-link">
                <div class="icon">📞</div>
                <div>
                    <p class="label">Phone</p>
                    <p class="value">+39 0731 693222</p>
                </div>
            </a>

            <a href="mailto:info@joytek.it" class="info-link">
                <div class="icon">✉️</div>
                <div>
                    <p class="label">Email</p>
                    <p class="value">info@joytek.it</p>
                </div>
            </a>

            <a href="https://www.google.com/maps/search/?api=1&query=Joytek+San+Giuseppe+6+San+Paolo+di+Jesi" target="_blank" class="info-link">
                <div class="icon">📍</div>
                <div>
                    <p class="label">Address</p>
                    <p class="value">Via San Giuseppe, 6<br>60038 San Paolo di Jesi (AN)</p>
                </div>
            </a>

            <div class="linkedin-box">
                <a href="https://www.linkedin.com/company/joytek-srls/" target="_blank" class="linkedin-btn">
                    <span>in</span> 
                </a>
            </div>
        </div>
    </div>

    <footer class="final-actions">
        <a href="mailto:hamza@sabrtech.it?subject=MagTag Inquiry - Joytek" class="btn-main">
           Attiva Servizio MagTag
        </a>
        <br>
        <a href="https://sabrtech.it" class="btn-sabr-brand">
            Powered by <span>SABR</span>
        </a>
    </footer>

</body>
</html>
