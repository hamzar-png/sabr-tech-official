<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rouias Hamza | SABR Tech</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>

    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', sans-serif; 
        }
        
        body { 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        /* CARD PRINCIPALE IN STILE GLASSMORPHISM AVANZATO */
        .profile-card {
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            background: rgba(15, 15, 20, 0.6); 
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 
                        0 0 40px rgba(255, 255, 255, 0.02) inset;
            text-align: center;
            z-index: 1;
            transform: translateY(0);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4), 
                        0 0 50px rgba(255, 255, 255, 0.05) inset;
        }

        /* INFORMAZIONI PERSONALI */
        .profile-name { 
            font-size: 24px; 
            color: #ffffff;
            letter-spacing: -0.5px; 
            font-weight: 700; 
            margin-bottom: 8px;
        }
        
        .profile-badge { 
            display: inline-block;
            background: rgba(255, 255, 255, 0.08);
            color: #e0e0e0; 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            padding: 6px 16px;
            border-radius: 100px;
            font-weight: 500;
            margin-bottom: 35px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* LISTA DEI LINK DI CONTATTO */
        .contacts-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .contact-button { 
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 16px 20px; 
            border-radius: 16px;
            text-decoration: none;
            color: #f0f0f0;
            font-size: 14px;
            font-weight: 400;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: left;
        }

        .contact-button i {
            color: #aaa;
            width: 18px;
            height: 18px;
            transition: color 0.25s ease;
        }

        /* Effetti al passaggio del mouse sui contatti standard */
        .contact-button:hover {
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            transform: scale(1.02);
        }

        .contact-button:hover i {
            color: #ffffff; 
        }

        /* Effetto speciale dedicato a Instagram */
        .instagram-btn:hover i {
            color: #e1306c !important; /* Colore brand Instagram */
        }

        /* FOOTER BRANDING */
        .footer-brand { 
            margin-top: 30px; 
            text-align: center; 
            z-index: 1; 
        }
        
        .btn-sabr-link { 
            font-size: 11px; 
            letter-spacing: 3px; 
            color: rgba(255, 255, 255, 0.3); 
            text-decoration: none; 
            text-transform: uppercase; 
            transition: color 0.3s ease;
        }
        
        .btn-sabr-link:hover {
            color: rgba(255, 255, 255, 0.7);
        }
        
        .btn-sabr-link span { 
            color: rgba(255, 255, 255, 0.9); 
            font-weight: 700; 
        }
    </style>
</head>
<body>

    <main class="profile-card">
        <h1 class="profile-name">Rouias Hamza</h1>
        <div class="profile-badge">Fondatore & Sviluppatore</div>
        
        <div class="contacts-list">
            <a href="tel:3516063107" class="contact-button">
                <i data-lucide="phone"></i>
                <span>351 6063107</span>
            </a>
            
            <a href="mailto:hamza@sabrtech.it" class="contact-button">
                <i data-lucide="mail"></i>
                <span>hamza@sabrtech.it</span>
            </a>
            
            <a href="https://sabrtech.it" target="_blank" class="contact-button">
                <i data-lucide="globe"></i>
                <span>sabrtech.it</span>
            </a>
            
            <a href="https://www.instagram.com/sabr.tech" target="_blank" class="contact-button instagram-btn">
                <i data-lucide="instagram"></i>
                <span>@sabr.tech</span>
            </a>
        </div>
    </main>

    <footer class="footer-brand">
        <a href="https://sabrtech.it" class="btn-sabr-link">
            Powered by <span>SABR</span>
        </a>
    </footer>

    <script>
        lucide.createIcons();
    </script>

    <script>
    VANTA.FOG({
      el: "body",
      mouseControls: true,
      touchControls: true,
      gyroControls: false,
      minHeight: 200.00,
      minWidth: 200.00,
      highlightColor: 0x818181,
      midtoneColor: 0x0,
      lowlightColor: 0x2e2e2e,
      baseColor: 0xbdbdbd,
      blurFactor: 0.41,
      speed: 1.20,
      zoom: 1.10
    })
    </script>
</body>
</html>
