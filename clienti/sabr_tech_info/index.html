<!DOCTYPE html>
<html lang="it">
<head>
    <link rel="icon" type="image/png" href="favicon_sabr.png">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rouias Hamza | SABR</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>

    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', sans-serif; 
        }
        
        body { 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* LOGO AZIENDALE IN ALTO */
        .brand-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            z-index: 1;
        }

        .brand-logo {
            height: 50px; /* Logo in piccolo */
            width: auto;
            object-fit: contain;
        }

        .brand-title {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #ffffff;
            text-transform: uppercase;
        }

        /* CARD IN STILE GLASSMORPHISM */
        .profile-card {
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            background: rgba(15, 15, 20, 0.60); 
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 35px 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
            z-index: 1;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.25);
        }

        /* INFORMAZIONI PERSONALI */
        .profile-name { 
            font-size: 22px; 
            color: #ffffff;
            font-weight: 700; 
            margin-bottom: 6px;
        }
        
        .profile-badge { 
            display: inline-block;
            background: rgba(255, 255, 255, 0.08);
            color: #d1d1d1; 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            padding: 6px 16px;
            border-radius: 100px;
            font-weight: 500;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* LISTA DEI LINK DI CONTATTO */
        .contacts-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .contact-button { 
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.07);
            padding: 16px 20px; 
            border-radius: 16px;
            text-decoration: none;
            color: #f0f0f0;
            font-size: 14px;
            transition: all 0.25s ease;
            text-align: left;
        }

        /* Fix per icone stabili */
        .contact-button i, .contact-button svg {
            color: #b3b3b3 !important;
            width: 20px !important;
            height: 20px !important;
            flex-shrink: 0;
            transition: color 0.25s ease, transform 0.25s ease;
        }

        /* Effetti Hover */
        .contact-button:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
            color: #ffffff;
        }

        .contact-button:hover i, .contact-button:hover svg {
            color: #ffffff !important;
            transform: scale(1.1);
        }

        /* Focus specifico sul brand Instagram al passaggio del mouse */
        .instagram-btn:hover i, .instagram-btn:hover svg {
            color: #fccc63 !important; /* Colore caldo stile Instagram gradient */
        }

        /* FOOTER BRANDING */
        .footer-brand { 
            margin-top: 35px; 
            text-align: center; 
            z-index: 1; 
        }
        
        .btn-sabr-link { 
            font-size: 11px; 
            letter-spacing: 3px; 
            color: rgba(255, 255, 255, 0.3); 
            text-decoration: none; 
            text-transform: uppercase; 
            transition: color 0.3s ease;
        }
        
        .btn-sabr-link:hover {
            color: rgba(255, 255, 255, 0.6);
        }
        
        .btn-sabr-link span { 
            color: rgba(255, 255, 255, 0.8); 
            font-weight: 700; 
        }
    </style>
</head>
<body>

    <header class="brand-header">
        <img src="sabr_logo.png" alt="Logo SABRA" class="brand-logo">
        <h1 class="brand-title">SABR</h1>
    </header>

    <main class="profile-card">
        <h2 class="profile-name">Rouias Hamza</h2>
        <div class="profile-badge">Fondatore & Sviluppatore</div>
        
        <div class="contacts-list">
            <a href="tel:3516063107" class="contact-button">
                <i data-lucide="phone"></i>
                <span>351 6063107</span>
            </a>
            
            <a href="mailto:hamza@sabrtech.it" class="contact-button">
                <i data-lucide="mail"></i>
                <span>hamza@sabrtech.it</span>
            </a>
            
            <a href="https://sabrtech.it" target="_blank" class="contact-button">
                <i data-lucide="globe"></i>
                <span>sabrtech.it</span>
            </a>
            
            <a href="https://www.instagram.com/sabr.tech" target="_blank" class="contact-button instagram-btn">
                <i data-lucide="instagram"></i>
                <span>@sabr.tech</span>
            </a>
        </div>
    </main>

    <footer class="footer-brand">
        <a href="https://sabrtech.it" class="btn-sabr-link">
            Powered by <span>SABR</span>
        </a>
    </footer>

    <script>
        lucide.createIcons();
    </script>

    <script>
    VANTA.FOG({
      el: "body",
      mouseControls: true,
      touchControls: true,
      gyroControls: false,
      minHeight: 200.00,
      minWidth: 200.00,
      highlightColor: 0x818181,
      midtoneColor: 0x0,
      lowlightColor: 0x2e2e2e,
      baseColor: 0xbdbdbd,
      blurFactor: 0.41,
      speed: 1.20,
      zoom: 1.10
    })
    </script>
</body>
</html>
