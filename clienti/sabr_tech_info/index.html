<!DOCTYPE html>
<html lang="it">
<head> 
    <link rel="icon" type="image/png" href="favicon-incom.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rouias Hamza | SABR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            color: white; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Centra verticalmente la scheda nella pagina */
            padding: 20px;
        }

        /* LAYOUT CONTENITORE */
        .panels-container { 
            display: flex;
            justify-content: center;
            width: 100%;
            max-width: 450px; /* Ottimizzato per una scheda singola sia su desktop che mobile */
            z-index: 1; 
        }

        .card-panel {
            backdrop-filter: blur(15px);
            background: rgba(0, 0, 0, 0.45); 
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .panel-name { 
            font-size: 18px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 5px; 
            font-weight: 700; 
            text-align: center;
        }
        
        .panel-role { 
            color: #aaa; 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-bottom: 25px; 
            text-align: center;
        }

        .info-item { 
            margin-bottom: 12px; 
            padding: 8px 0; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column; 
            align-items: flex-start;
            text-decoration: none;
            color: white;
            font-size: 13px;
            word-break: break-all;
            transition: opacity 0.2s ease;
        }

        .info-item:hover {
            opacity: 0.7; 
        }

        .info-label { font-size: 9px; text-transform: uppercase; color: #888; margin-bottom: 4px; }

        .final-actions { margin-top: 30px; text-align: center; width: 100%; z-index: 1; }
        
        .btn-sabr-brand { font-size: 11px; letter-spacing: 4px; color: rgba(255,255,255,0.4); text-decoration: none; text-transform: uppercase; }
        .btn-sabr-brand span { color: white; font-weight: 800; }
    </style>
</head>
<body>

    <main class="panels-container">

        <div class="card-panel">
            <h2 class="panel-name">Rouias Hamza</h2>
            <p class="panel-role">Fondatore & Sviluppatore</p>
            
            <a href="tel:3516063107" class="info-item">
                <span class="info-label">Mobile</span>
                <span>351 6063107</span>
            </a>
            
            <a href="mailto:hamza@sabrtech.it" class="info-item">
                <span class="info-label">Email</span>
                <span>hamza@sabrtech.it</span>
            </a>
            
            <a href="https://sabrtech.it" target="_blank" class="info-item">
                <span class="info-label">Web</span>
                <span>sabrtech.it</span>
            </a>
            
            <a href="https://www.instagram.com/sabr.tech" target="_blank" class="info-item">
                <span class="info-label">Instagram</span>
                <span>@sabr.tech</span>
            </a>
        </div>

    </main>

    <footer class="final-actions">
        <a href="https://sabrtech.it" class="btn-sabr-brand">
            Powered by <span>SABR</span>
        </a>
    </footer>

    <script>
    VANTA.FOG({
      el: "body",
      mouseControls: true,
      touchControls: true,
      gyroControls: false,
      minHeight: 200.00,
      minWidth: 200.00,
      highlightColor: 0x818181,
      midtoneColor: 0x0,
      lowlightColor: 0x2e2e2e,
      baseColor: 0xbdbdbd,
      blurFactor: 0.41,
      speed: 1.20,
      zoom: 1.10
    })
    </script>
</body>
</html>
