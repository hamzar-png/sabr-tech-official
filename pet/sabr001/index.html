<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SABR Pet ID | Aiutami a tornare a casa</title>
    
    <link rel="icon" type="image/png" href="../../favicon-sabr.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            color: white; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* SFONDO: Un prato verde rilassante per amanti degli animali */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1504608524841-42fe6f032b4b?q=80&w=1365&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding: 20px;
        }

        .pet-header {
            text-align: center;
            margin-top: 30px;
            margin-bottom: 20px;
        }

        .pet-header h1 {
            font-size: 45px;
            text-transform: uppercase;
            font-weight: 800;
            color: #FFD700; 
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .pet-header p {
            font-size: 14px;
            letter-spacing: 2px;
            font-weight: 700;
            text-transform: uppercase;
            background: #ff4444;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 50px;
            margin-bottom: 10px;
        }

        .panels-container { 
            width: 100%;
            max-width: 400px;
        }

        .card-panel {
            backdrop-filter: blur(15px);
            background: rgba(0, 0, 0, 0.6);
            padding: 30px;
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .owner-info {
            margin: 20px 0;
            text-align: left;
        }

        .info-item {
            margin-bottom: 15px;
            border-left: 3px solid #FFD700;
            padding-left: 15px;
        }

        .info-label { font-size: 10px; text-transform: uppercase; color: #FFD700; font-weight: 800; }
        .info-value { font-size: 17px; font-weight: 600; color: #fff; }

        /* PULSANTI */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            font-weight: 800;
            text-decoration: none;
            text-transform: uppercase;
            margin-bottom: 15px;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-gps { background: #fff; color: #000; }
        .btn-call { background: #28a745; color: white; }
        
        .btn:hover { transform: scale(1.02); }

        .footer { margin-top: 20px; font-size: 10px; opacity: 0.6; }
        .footer a { color: white; text-decoration: none; font-weight: 800; }
    </style>
</head>
<body>

    <header class="pet-header">
        <p>🐾 MI SONO PERSO</p>
        <h1>BUDDY</h1> 
    </header>

    <main class="panels-container">
        <div class="card-panel">
            <h2 style="font-size: 18px; margin-bottom: 10px;">Aiutami a tornare a casa!</h2>
            <p style="font-size: 14px; color: #ccc; margin-bottom: 20px;">Il mio proprietario è preoccupato. Per favore, usa i tasti qui sotto.</p>

            <button onclick="mandaGps()" class="btn btn-gps" id="gpsBtn">📍 INVIA LA MIA POSIZIONE</button>
            <a href="tel:3331234567" class="btn btn-call">📞 CHIAMA PROPRIETARIO</a>

            <div class="owner-info">
                <div class="info-item">
                    <div class="info-label">Proprietario</div>
                    <div class="info-value">Mario Rossi</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Indirizzo</div>
                    <div class="info-value">Via Roma 12, Milano (MI)</div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <a href="https://sabrtech.it">POWERED BY <span>SABR</span></a>
    </footer>

<script>
// --- CONFIGURAZIONE EMAILJS NUOVA ---
(function() { emailjs.init("FIbAY1fAaCfoe6hoL"); })(); // <-- La tua nuova chiave account
const SERVICE_ID = "service_rsjtlzp";                 // <-- Il tuo nuovo Service ID
const TEMPLATE_ID = "template_20xptx6";               // <-- Il tuo nuovo Template ID

// --- DATI ANIMALE/CLIENTE AGGIORNATI ---
const ID_TAG = "PET-ragazze-001";                       // <-- L'ID del ciondolo
const NOME_CLIENTE = "ragazze";                   // <-- Il nome del padrone
const EMAIL_CLIENTE = "";       // <-- L'email del padrone
const EMAIL_SABR = "financialmask@gmail.com";         // <-- La TUA email dove ricevi le notifiche di controllo

function inviaEmail(testo) {
    const params = { id_tag: ID_TAG, nome: NOME_CLIENTE, messaggio: testo };
    
    // Primo invio a SABR
    emailjs.send(SERVICE_ID, TEMPLATE_ID, { ...params, to_email: EMAIL_SABR })
        .then(() => console.log("Email inviata con successo a SABR"))
        .catch(err => console.error("Errore invio SABR:", err));

    // Secondo invio al Cliente (ritardato di 1.2 secondi per evitare sovrapposizioni)
    setTimeout(() => {
        emailjs.send(SERVICE_ID, TEMPLATE_ID, { ...params, to_email: EMAIL_CLIENTE })
            .then(() => console.log("Email inviata con successo al Cliente"))
            .catch(err => console.error("Errore invio Cliente:", err));
    }, 1200);
}

// ALERT SILENZIOSO ALL'APERTURA (CON CONTROLLO ERRORI)
window.onload = function() {
    fetch('https://ipapi.co/json/')
        .then(res => {
            if(!res.ok) throw new Error("Limite API IP raggiunto");
            return res.json();
        })
        .then(data => {
            let localita = data.city ? data.city : "posizione stimata";
            inviaEmail("🐕 NOTIFICA PET: Il ciondolo di BUDDY è stato scansionato vicino a " + localita + ". Qualcuno sta visualizzando i tuoi contatti.");
        })
        .catch(err => {
            // Se l'API dell'IP fallisce o finisce i crediti, l'email parte comunque in modalità generica
            console.log("Uso notifica generica a causa di un blocco API IP:", err.message);
            inviaEmail("🐕 NOTIFICA PET: Il ciondolo di BUDDY è stato scansionato! Qualcuno sta visualizzando i tuoi contatti.");
        });
};

// FUNZIONE GPS CORRETTA
function mandaGps() {
    const btn = document.getElementById('gpsBtn');
    btn.innerText = "Invio in corso...";
    btn.disabled = true;

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(pos) {
            // Corretto il link di Google Maps che aveva un errore di battitura
            var mapsUrl = "https://www.google.com/maps?q=" + pos.coords.latitude + "," + pos.coords.longitude;
            inviaEmail("📍 POSIZIONE ESATTA DI BUDDY: " + mapsUrl);
            btn.style.background = "#28a745";
            btn.style.color = "#fff";
            btn.innerText = "✅ POSIZIONE INVIATA";
            alert("Grazie! La tua posizione è stata inviata al proprietario.");
        }, function(error) {
            alert("Per favore abilita il GPS per poter inviare la tua posizione esatta.");
            btn.disabled = false;
            btn.innerText = "📍 RIPROVA INVIO";
            console.error(error);
        }, { enableHighAccuracy: true });
    } else {
        alert("Geolocalizzazione non supportata da questo browser.");
        btn.disabled = false;
        btn.innerText = "📍 RIPROVA INVIO";
    }
}
</script>

</body>
</html>
