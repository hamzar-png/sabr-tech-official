<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SABR - Recupero MagTag</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; padding: 20px; background: #000; color: #fff; }
        .container { max-width: 400px; margin: 40px auto; background: #111; padding: 30px; border-radius: 25px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo { font-size: 28px; font-weight: bold; letter-spacing: 2px; margin-bottom: 10px; }
        .status-badge { display: inline-block; padding: 5px 15px; background: #ff4444; border-radius: 20px; font-size: 12px; margin-bottom: 20px; text-transform: uppercase; font-weight: bold; }
        h2 { margin-bottom: 10px; font-size: 22px; }
        p { color: #aaa; line-height: 1.5; margin-bottom: 25px; font-size: 15px; }
        .btn { display: flex; align-items: center; justify-content: center; width: 100%; padding: 18px; margin: 12px 0; border-radius: 15px; text-decoration: none; font-weight: bold; font-size: 16px; border: none; cursor: pointer; transition: transform 0.2s; box-sizing: border-box; }
        .btn:active { transform: scale(0.98); }
        .btn-gps { background: #fff; color: #000; }
        .btn-call { border: 1px solid #444; background: transparent; color: #fff; }
        .footer-logo { margin-top: 20px; font-size: 12px; color: #444; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">SABR</div>
    <div class="status-badge">Oggetto Smarrito</div>
    
    <h2>Grazie per averlo trovato!</h2>
    <p>Il proprietario è stato avvisato della scansione. Clicca il tasto bianco per inviargli la tua <strong>posizione precisa</strong> e aiutarlo a recuperare l'oggetto.</p>

    <button onclick="mandaGps()" class="btn btn-gps" id="mainBtn">📍 INVIA POSIZIONE ORA</button>

    <a href="tel:+393331234567" class="btn btn-call">📞 CHIAMA PROPRIETARIO</a>
    
    <div class="footer-logo">SABRTECH.IT</div>
</div>

<script>
// CONFIGURAZIONE SABR
const ACCESS_KEY = "663fdbd0-d3c1-4cb2-af29-6f5fcca7abeb";
const ID_TAG = "SABR001"; // Cambia questo per ogni cliente
const NOME_PROPRIETARIO = "MARIO"; // Cambia questo per ogni cliente

// 1. ALERT SILENZIOSO (IP - AVVISO IMMEDIATO)
window.onload = function() {
    fetch('https://ipapi.co/json/')
        .then(res => res.json())
        .then(data => {
            inviaEmail("⚠️ MagTag " + ID_TAG + " (" + NOME_PROPRIETARIO + ") scansionato.\nZona approssimativa: " + data.city + ", " + data.region + "\nAttesa scansione GPS precisa...");
        })
        .catch(err => {
            inviaEmail("⚠️ MagTag " + ID_TAG + " scansionato. (Dati IP non disponibili)");
        });
};

// FUNZIONE INVIO EMAIL
function inviaEmail(messaggio) {
    fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            access_key: ACCESS_KEY,
            subject: "NOTIFICA SABR - " + ID_TAG,
            from_name: "SABR System",
            message: messaggio
        })
    });
}

// 2. FUNZIONE GPS PRECISO
function mandaGps() {
    const btn = document.getElementById('mainBtn');
    btn.innerText = "Invio in corso...";
    btn.disabled = true;
    
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const mapsUrl = `https://www.google.com/maps?q=${lat},${lon}`;
            
            inviaEmail("📍 POSIZIONE ESATTA RILEVATA PER " + ID_TAG + "!\nVisualizza sulla mappa: " + mapsUrl);
            
            btn.style.background = "#28a745";
            btn.style.color = "#fff";
            btn.innerText = "✅ POSIZIONE INVIATA";
            alert("Grazie di cuore! La tua posizione è stata inviata al proprietario.");
        }, err => {
            alert("Per favore abilita il GPS nelle impostazioni del browser per inviare la posizione esatta.");
            btn.innerText = "📍 RIPROVA INVIO POSIZIONE";
            btn.disabled = false;
        }, { enableHighAccuracy: true, timeout: 5000 });
    } else {
        alert("Il tuo browser non supporta la geolocalizzazione.");
        btn.innerText = "📍 ERRORE GPS";
    }
}
</script>

</body>
</html>
