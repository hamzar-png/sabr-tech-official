<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SABR MagTag - Recupero</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 40px; background: #000; color: #fff; }
        .box { border: 1px solid #333; padding: 20px; border-radius: 20px; background: #111; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 18px; cursor: pointer; border: none; }
        .btn-call { background: #28a745; color: white; }
        .btn-gps { background: #007bff; color: white; }
    </style>
</head>
<body>

<div class="box">
    <h1>SABR MagTag</h1>
    <p>Hai trovato le chiavi di <strong>MARIO</strong></p>

    <a href="tel:+393331234567" class="btn btn-call">CHIAMA IL PROPRIETARIO</a>

    <button onclick="mandaGps()" class="btn btn-gps">INVIA POSIZIONE PRECISA</button>
</div>

<script>
// 1. APPENA SI APRE LA PAGINA, AVVISA IL PROPRIETARIO (ZONA IP)
window.onload = function() {
    fetch('https://ipapi.co/json/')
        .then(res => res.json())
        .then(data => {
            inviaEmail("⚠️ Scansione MagTag SABR001! Zona approssimativa: " + data.city + ", " + data.country_name);
        });
};

// 2. FUNZIONE PER INVIARE L'EMAIL (USA IL CODICE DI WEB3FORMS)
function inviaEmail(messaggio) {
    fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            access_key: '663fdbd0-d3c1-4cb2-af29-6f5fcca7abeb', 
            subject: 'Notifica MagTag SABR',
            from_name: 'SABR System',
            message: messaggio
        })
    });
}

// 3. FUNZIONE PER IL GPS PRECISO
function mandaGps() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            const link = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            inviaEmail("📍 POSIZIONE PRECISA RILEVATA: " + link);
            alert("Posizione inviata al proprietario! Grazie per l'aiuto.");
        });
    }
}
</script>

</body>
</html>
